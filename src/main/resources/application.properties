# Application Name
spring.application.name=appointly-review-service

# MySQL Database Configuration with auto-create
spring.datasource.url=jdbc:mysql://localhost:3306/review_service_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Gea5#jwk
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Properties (Hibernate 6+ dialect)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Server Configuration
server.port=8088

# Actuator
management.endpoints.web.exposure.include=health,info,metrics

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method